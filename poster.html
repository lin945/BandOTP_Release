<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BandOTP 海报</title>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
            background: #111;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px;
        }

        .btn-export {
            margin-bottom: 30px;
            padding: 14px 48px;
            font-size: 16px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        .btn-export:hover {
            background: #1d4ed8;
        }

        .poster {
            width: 1500px;
            height: 1000px;
            background: #fff;
            display: flex;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 30px 80px rgba(0,0,0,0.5);
        }

        .left {
            width: 640px;
            padding: 60px 55px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            background: #fafafa;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 24px;
            margin-bottom: 24px;
        }

        .brand-icon {
            width: 110px;
            height: 110px;
            border-radius: 28px;
            overflow: hidden;
            flex-shrink: 0;
        }

        .brand-icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .brand-name {
            font-size: 96px;
            font-weight: 700;
            color: #111;
            line-height: 1;
        }

        .brand-cn {
            font-size: 52px;
            font-weight: 600;
            color: #111;
            margin-bottom: 12px;
        }

        .brand-cn span {
            color: #6b7280;
            font-weight: 400;
            margin-left: 10px;
            font-size: 44px;
        }

        .tagline {
            font-size: 36px;
            color: #10b981;
            font-weight: 500;
            margin-bottom: 40px;
        }

        .desc {
            font-size: 22px;
            color: #555;
            line-height: 1.75;
            margin-bottom: 36px;
        }

        .features {
            display: flex;
            flex-wrap: wrap;
            gap: 14px;
            margin-bottom: 40px;
        }

        .feature-tag {
            padding: 10px 20px;
            background: #f0fdf4;
            border: 1px solid #d1fae5;
            border-radius: 8px;
            font-size: 17px;
            color: #059669;
            font-weight: 500;
        }

        .steps-title {
            font-size: 16px;
            font-weight: 600;
            color: #999;
            letter-spacing: 2px;
            margin-bottom: 18px;
            text-transform: uppercase;
        }

        .steps {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px 24px;
            margin-bottom: 32px;
        }

        .step {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 18px;
            color: #374151;
        }

        .step-num {
            width: 30px;
            height: 30px;
            background: #10b981;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 600;
            flex-shrink: 0;
        }

        .note {
            font-size: 16px;
            color: #999;
            margin-top: auto;
        }

        .note strong {
            color: #ef4444;
        }

        .right {
            flex: 1;
            background: linear-gradient(160deg, #f0fdf4 0%, #ecfdf5 50%, #f0f9ff 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            padding: 40px 30px;
            position: relative;
        }

        .device {
            flex-shrink: 0;
            overflow: hidden;
        }

        .device img {
            display: block;
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .device-square {
            width: 400px;
            height: 480px;
        }

        .device-oval {
            width: 300px;
            height: 520px;
        }

        .devices-info {
            position: absolute;
            bottom: 32px;
            left: 0;
            right: 0;
            text-align: center;
        }

        .devices-label {
            font-size: 15px;
            color: #999;
            letter-spacing: 1px;
        }

        .devices-list {
            font-size: 17px;
            color: #666;
            margin-top: 6px;
        }

        .devices-list em {
            color: #10b981;
            font-style: normal;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <button class="btn-export" onclick="exportPNG()">导出 PNG</button>

    <div class="poster" id="poster">
        <div class="left">
            <div class="brand">
                <div class="brand-icon"><img src="icon.png" alt="BandOTP"></div>
                <div class="brand-name">BandOTP</div>
            </div>
            <p class="brand-cn">腕码 <span>两步验证码</span></p>
            <p class="tagline">抬腕即看验证码，让双重验证更方便</p>

            <p class="desc">
                为智能手环打造的两阶段验证码工具，支持 GitHub、Google、Microsoft、阿里云、腾讯云等绝大多数平台。手机端管理密钥，手环离线生成验证码。
            </p>

            <div class="features">
                <span class="feature-tag">手机配置</span>
                <span class="feature-tag">离线生成</span>
                <span class="feature-tag">抬腕即看</span>
                <span class="feature-tag">多平台支持</span>
            </div>

            <p class="steps-title">使用流程</p>
            <div class="steps">
                <div class="step">
                    <span class="step-num">1</span>
                    获取密钥/二维码
                </div>
                <div class="step">
                    <span class="step-num">2</span>
                    手机端配置
                </div>
                <div class="step">
                    <span class="step-num">3</span>
                    同步到手环
                </div>
                <div class="step">
                    <span class="step-num">4</span>
                    抬腕查看
                </div>
            </div>

            <p class="note"><strong>* </strong>需在安卓端配置</p>
        </div>

        <div class="right">
            <div class="device device-square">
                <img src="preview6.png" alt="方形手环">
            </div>
            <div class="device device-oval">
                <img src="preview5.png" alt="椭圆手环">
            </div>

            <div class="devices-info">
                <p class="devices-label">已支持设备</p>
                <p class="devices-list">小米手环9 / 9 Pro / 10 / 10 Pro / Watch S4 <em>等</em></p>
            </div>
        </div>
    </div>

    <script>
        function exportPNG() {
            const poster = document.getElementById('poster');
            const btn = document.querySelector('.btn-export');
            btn.textContent = '导出中...';
            btn.disabled = true;

            html2canvas(poster, {
                scale: 2,
                useCORS: true,
                backgroundColor: '#ffffff',
                logging: false
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'BandOTP_poster.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
                btn.textContent = '导出 PNG';
                btn.disabled = false;
            }).catch(() => {
                btn.textContent = '导出 PNG';
                btn.disabled = false;
                alert('导出失败');
            });
        }
    </script>
</body>
</html>
