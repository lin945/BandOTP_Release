<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BandOTP 海报</title>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, "Microsoft YaHei", sans-serif;
            background-color: #1a1a1a;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px;
            min-height: 100vh;
        }

        .btn-export {
            margin-bottom: 30px;
            padding: 14px 40px;
            font-size: 16px;
            font-weight: 500;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-export:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.5);
        }

        .btn-export:active {
            transform: translateY(0);
        }

        .poster {
            width: 1500px;
            height: 1000px;
            background: linear-gradient(145deg, #f5f1eb 0%, #ebe5db 50%, #e8e2d6 100%);
            display: flex;
            padding: 70px 80px;
            gap: 60px;
            border-radius: 4px;
            box-shadow: 0 25px 80px rgba(0,0,0,0.4);
            position: relative;
            overflow: hidden;
        }

        .poster::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #667eea, #764ba2, #f093fb);
        }

        .content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
            z-index: 1;
        }

        .title {
            font-size: 52px;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 12px;
            letter-spacing: -1px;
        }

        .title span {
            color: #667eea;
        }

        .subtitle {
            font-size: 20px;
            color: #666;
            margin-bottom: 45px;
            font-weight: 300;
            letter-spacing: 2px;
        }

        .description {
            font-size: 22px;
            color: #333;
            margin-bottom: 32px;
            font-weight: 500;
            padding-left: 16px;
            border-left: 3px solid #667eea;
        }

        .features {
            font-size: 17px;
            color: #555;
            line-height: 2.2;
            margin-bottom: 45px;
        }

        .features li {
            list-style: none;
            position: relative;
            padding-left: 28px;
            transition: color 0.2s;
        }

        .features li::before {
            content: "";
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 8px;
            height: 8px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 50%;
        }

        .section-title {
            font-size: 18px;
            color: #888;
            margin-bottom: 16px;
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .steps {
            font-size: 17px;
            color: #555;
            line-height: 2.2;
            margin-bottom: 45px;
        }

        .steps li {
            list-style: none;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .step-num {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 28px;
            height: 28px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 50%;
            font-size: 13px;
            font-weight: 500;
            flex-shrink: 0;
        }

        .support-info {
            font-size: 16px;
            color: #666;
            line-height: 1.9;
            margin-bottom: 40px;
            padding: 16px 20px;
            background: rgba(102, 126, 234, 0.06);
            border-radius: 10px;
            border-left: 3px solid #667eea;
        }

        .note {
            font-size: 14px;
            color: #999;
            line-height: 1.7;
        }

        .devices {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            position: relative;
        }

        .device {
            position: relative;
            transition: transform 0.3s ease;
        }

        .device:hover {
            transform: scale(1.02);
        }

        .device-square {
            width: 340px;
            height: 420px;
        }

        .device-oval {
            width: 260px;
            height: 450px;
        }

        .device img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 20px 40px rgba(0,0,0,0.25));
        }

        .arrow {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            color: #aaa;
        }

        .arrow svg {
            width: 40px;
            height: 40px;
            opacity: 0.5;
        }

        .arrow-line {
            width: 2px;
            height: 60px;
            background: linear-gradient(180deg, transparent, #ccc, transparent);
        }
    </style>
</head>
<body>
    <button class="btn-export" onclick="exportPNG()">
        <span>导出 PNG 图片</span>
    </button>

    <div class="poster" id="poster">
        <div class="content">
            <h1 class="title">腕码 <span>BandOTP</span></h1>
            <p class="subtitle">抬腕即看验证码，让双重验证更方便</p>

            <p class="description">为智能手环打造的 TOTP / OTP 动态验证码工具</p>
            <ul class="features">
                <li>手机配置并同步到手环</li>
                <li>手环本地离线生成验证码，无需联网</li>
                <li>抬腕即可查看，减少手机切换</li>
            </ul>

            <h2 class="section-title">使用流程</h2>
            <ol class="steps">
                <li><span class="step-num">1</span> 导入密钥/扫描二维码</li>
                <li><span class="step-num">2</span> 手机完成配置</li>
                <li><span class="step-num">3</span> 同步到手环</li>
                <li><span class="step-num">4</span> 抬腕查看动态验证码</li>
            </ol>

            <div class="support-info">
                支持标准 TOTP 登录场景<br>
                开发者账号、邮箱、企业后台等
            </div>

            <p class="note">
                注意：目前仅支持 Android 端配置<br>
                下载请扫码加入交流群
            </p>
        </div>

        <div class="devices">
            <div class="device device-square">
                <img src="preview6.png" alt="方形手环运行画面">
            </div>
            <div class="arrow">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M19 12H5M12 19l-7-7 7-7"/>
                </svg>
            </div>
            <div class="device device-oval">
                <img src="preview5.png" alt="椭圆形手环运行画面">
            </div>
        </div>
    </div>

    <script>
        function exportPNG() {
            const poster = document.getElementById('poster');
            const btn = document.querySelector('.btn-export');
            
            btn.innerHTML = '<span>导出中...</span>';
            btn.disabled = true;

            html2canvas(poster, {
                scale: 2,
                useCORS: true,
                backgroundColor: null,
                logging: false
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'BandOTP_poster.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
                
                btn.innerHTML = '<span>导出 PNG 图片</span>';
                btn.disabled = false;
            }).catch(err => {
                console.error('导出失败:', err);
                btn.innerHTML = '<span>导出 PNG 图片</span>';
                btn.disabled = false;
                alert('导出失败，请重试');
            });
        }
    </script>
</body>
</html>
